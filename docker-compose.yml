services:
  nginx:
    build: ./nginx
    image: nginx
    container_name: "nginx_cont"
    ports:
      - "80:80"
    restart: always
    depends_on:
      - django_app
    networks:
      - notes-app-nw

  django_app:
    build:
      context: .
    image: django_app
    container_name: "django_cont"
    ports:
      - "8000:8000"
    environment:
      SQLITE_PATH: /app/data/db.sqlite3
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    networks:
      - notes-app-nw

networks:
  notes-app-nw:

volumes:
  sqlite_data:
